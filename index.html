<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Binance Researcher Full-Market v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c0f; --bg2: #111418; --bg3: #181d23; --bg4: #1e252e;
    --border: #2a3340; --text: #e8edf2; --text2: #8a9ab0;
    --accent: #f0b90b; --green: #0ecb81; --red: #f6465d;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; overflow-x: hidden; }

  /* --- RESPONSIVE LAYOUT --- */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; position: sticky; top: 0; z-index: 1000; }
  .container { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 60px); }

  @media (max-width: 1024px) {
    .container { grid-template-columns: 1fr; height: auto; }
    .sidebar { border-right: none; height: auto !important; }
    .metrics { grid-template-columns: repeat(2, 1fr) !important; }
  }

  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .main { overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1.25rem; }

  /* --- COMPONENTS --- */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
  .card-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
  
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .metric { background: var(--bg3); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
  .m-val { font-family: var(--mono); font-size: 18px; font-weight: 600; margin-top: 4px; }

  input, select, textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: #fff; padding: 10px; font-family: var(--mono); font-size: 12px; margin-top: 5px; }
  .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-family: var(--mono); font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }

  /* --- MARKET TABLE --- */
  .table-wrap { overflow-x: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 650px; }
  th { text-align: left; font-size: 11px; color: var(--text2); padding: 10px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 10px; border-bottom: 1px solid var(--bg3); font-size: 13px; }
  .badge { padding: 3px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .badge-news { background: rgba(246,70,93,0.1); color: var(--red); border: 1px solid var(--red); }

  /* --- LOGS --- */
  .log-box { background: #000; border-radius: 8px; height: 180px; overflow-y: auto; padding: 10px; font-family: var(--mono); font-size: 11px; color: var(--green); line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div style="font-family: var(--mono); font-weight: 700; color: var(--accent);">[RESEARCHER_AI_FULL]</div>
  <div id="status-tag" class="badge" style="border: 1px solid var(--text2);">STANDBY</div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="card">
      <div class="card-title">🔑 Auth & Keys</div>
      <input type="password" id="openai-key" placeholder="OpenAI API Key">
      <input type="password" id="binance-key" placeholder="Binance Square API Key">
    </div>

    <div class="card">
      <div class="card-title">📉 Research Scope</div>
      <select id="scan-depth">
        <option value="250">Top 250 Coins (Fast)</option>
        <option value="1000">Top 1000 Coins (Deep)</option>
        <option value="all">Tất cả (Full Market)</option>
      </select>
      <div style="margin-top:10px;">
        <label style="font-size:11px; color:var(--text2)">Tỷ lệ Researcher: <b id="ratio-val">80%</b></label>
        <input type="range" id="ratio-slider" min="0" max="100" value="80">
      </div>
    </div>

    <button class="btn btn-primary" onclick="toggleEngine()">START RESEARCH ENGINE</button>
    <button class="btn btn-outline" onclick="manualScan()">QUÉT TOÀN BỘ NGAY</button>
  </div>

  <div class="main">
    <div class="metric-grid">
      <div class="metric"><div class="card-title">COINS SCAN</div><div class="m-val" id="count-coins">0</div></div>
      <div class="metric"><div class="card-title">DRAMA FIND</div><div class="m-val" id="count-news" style="color:var(--red)">0</div></div>
      <div class="metric"><div class="card-title">POSTED</div><div class="m-val" id="count-post" style="color:var(--accent)">0</div></div>
      <div class="metric"><div class="card-title">NEXT CYCLE</div><div class="m-val" id="m-timer">90:00</div></div>
    </div>

    <div class="card">
      <div class="card-title">📊 Live Market Signals (Full Data)</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ASSET</th><th>PRICE</th><th>24H %</th><th>SIGNAL/DRAMA</th><th>ACTION</th></tr>
          </thead>
          <tbody id="market-list">
            <tr><td colspan="5" style="text-align:center; padding:50px; color:var(--text2)">Nhấn quét để lấy dữ liệu toàn thị trường...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🖥 System Terminal</div>
      <div class="log-box" id="terminal"></div>
    </div>
  </div>
</div>

<script>
const state = {
  isRunning: false,
  allCoins: [],
  postedCount: 0,
};

// --- CHỈNH SỬA: QUÉT TẤT CẢ COIN (PAGINATION) ---
async function fetchFullMarket() {
  const depth = document.getElementById('scan-depth').value;
  const pages = depth === 'all' ? 5 : (depth / 250); // 1 page = 250 coins
  addLog(`Bắt đầu quét sâu... Mục tiêu: ${depth} coins.`);
  
  state.allCoins = [];
  try {
    for (let i = 1; i <= pages; i++) {
      addLog(`Đang tải trang ${i} từ CoinGecko...`);
      const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${i}`);
      const data = await res.json();
      state.allCoins = [...state.allCoins, ...data];
      updateUI();
      // Tránh bị Rate Limit
      await new Promise(r => setTimeout(r, 1000));
    }
    addLog(`Thành công! Đã quét tổng cộng ${state.allCoins.length} coins.`);
  } catch (e) {
    addLog(`Lỗi quét dữ liệu: ${e.message}`);
  }
}

function updateUI() {
  document.getElementById('count-coins').textContent = state.allCoins.length;
  const tbody = document.getElementById('market-list');
  const newsCoins = state.allCoins.filter(c => Math.abs(c.price_change_percentage_24h) > 8);
  document.getElementById('count-news').textContent = newsCoins.length;

  tbody.innerHTML = state.allCoins.slice(0, 50).map(c => `
    <tr>
      <td><b>${c.symbol.toUpperCase()}</b> <small style="color:var(--text2)">${c.name}</small></td>
      <td class="mono">$${c.current_price.toLocaleString()}</td>
      <td style="color:${c.price_change_percentage_24h >=0 ? 'var(--green)':'var(--red)'}">${c.price_change_percentage_24h.toFixed(2)}%</td>
      <td>${Math.abs(c.price_change_percentage_24h) > 8 ? '<span class="badge badge-news">🔥 HIGH DRAMA</span>' : '--'}</td>
      <td><button style="font-size:10px; cursor:pointer" onclick="alert('Đã gửi cho AI Researcher phân tích!')">Phân tích</button></td>
    </tr>
  `).join('');
}

function addLog(msg) {
  const term = document.getElementById('terminal');
  term.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  term.scrollTop = term.scrollHeight;
}

function toggleEngine() {
  state.isRunning = !state.isRunning;
  const tag = document.getElementById('status-tag');
  tag.textContent = state.isRunning ? "RUNNING" : "STOPPED";
  tag.style.color = state.isRunning ? "var(--green)" : "var(--red)";
  if(state.isRunning) fetchFullMarket();
}

function manualScan() {
  fetchFullMarket();
}

document.getElementById('ratio-slider').oninput = function() {
  document.getElementById('ratio-val').textContent = this.value + '%';
};
</script>
</body>
</html>
